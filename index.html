<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards de Viagem</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital@0;1&display=swap');
    </style>
</head>

<body>
    <section class="container">
        <div class="top">
            <h3>TURISMO & CULTURA</h3>
            <h1>Qual seu próximo destino?</h1>
        </div>

        <div class="cards">
            <div class="card">
                <img src="/img-londres.jpg" alt="">
                <h4>Londres - Reino Unido</h4>
                <button>Viajar</button>
            </div>

            <div class="card">
                <img src="/img-veneza.jpg" alt="">
                <h4>Veneza - Itália</h4>

                <button>Viajar</button>
            </div>
            <div class="card">
                <img src="/img-tokyo.jpg" alt="">
                <h4>Tokyo - Japão</h4>

                <button>Viajar</button>
            </div>
            <div class="card">
                <img src="/img-paris.jpg" alt="">
                <h4>Paris - França</h4>
                <button>Viajar</button>
            </div>
            <div class="card">
                <img src="/img-barcelona.jpg" alt="">
                <h4>Barcelona - Espanha</h4>
                <button>Viajar</button>
            </div>
            <div class="card">
                <img src="/img-jalapao.jpg" alt="">
                <h4>Jalapão - Brasil</h4>
                <button>Viajar</button>
            </div>
            <div class="card">
                <img src="/img-santorini.jpg" alt="">
                <h4>Santorini - Grécia</h4>
                <button>Viajar</button>
            </div>
            <div class="card">
                <img src="/img-machupicchu.jpg" alt="">
                <h4>Machu Picchu - Peru</h4>
                <button>Viajar</button>
            </div>

        </div>
    </section>
</body>

</html>
